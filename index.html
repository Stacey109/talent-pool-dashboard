<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人才库BI看板 | Talent Pool Dashboard</title>
<style>
  :root {
    --bg: #f5f7fb;
    --card-bg: #ffffff;
    --primary: #4f46b5;
    --accent: #ff5f9f;
    --source: #1663d8;
    --label: #008b82;
    --text: #263238;
    --sub: #68717d;
    --muted: #a6afba;
    --border: #e7ebf2;
    --tag-bg: #f0edff;
    --tag-text: #4f46b5;
    --green: #00a884;
    --orange: #f5a623;
    --red: #e17055;
    --blue: #4da3ff;
    --shadow: 0 2px 14px rgba(20, 24, 40, 0.07);
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 32px 24px;
    min-height: 100vh;
  }

  .header {
    max-width: 1480px;
    margin: 0 auto 24px;
    display: grid;
    gap: 16px;
  }

  h1 {
    font-size: 30px;
    font-weight: 780;
    background: linear-gradient(135deg, var(--primary), #8f7cff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    flex-wrap: wrap;
  }

  .header-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .action-btn {
    border: none;
    border-radius: 10px;
    background: var(--primary);
    color: #fff;
    cursor: pointer;
    font-size: 13px;
    font-weight: 680;
    padding: 9px 14px;
    transition: all .2s;
  }

  .action-btn:hover { box-shadow: 0 4px 12px rgba(79, 70, 181, .28); }
  .action-btn.secondary { background: #fff; color: var(--primary); border: 1px solid var(--border); }
  .action-btn.danger { background: #fff1ee; color: var(--red); border: 1px solid #ffd8d0; }

  .quick-filters {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
    width: 100%;
  }

  .filter-module {
    background: #fff;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px;
    display: grid;
    gap: 12px;
  }

  .filter-module-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    font-size: 16px;
    font-weight: 760;
  }

  .filter-module-title.source { color: var(--source); }
  .filter-module-title.label { color: var(--label); }

  .filter-reset {
    color: var(--sub);
    font-size: 12px;
    font-weight: 520;
  }

  .filter-group {
    display: grid;
    grid-template-columns: 78px 1fr;
    gap: 10px;
    align-items: center;
  }

  .filter-label {
    border-radius: 999px;
    color: #fff;
    font-size: 12px;
    font-weight: 680;
    padding: 6px 11px;
    white-space: nowrap;
  }

  .filter-label.source { background: var(--source); }
  .filter-label.label { background: var(--label); }

  .filter-options {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .pill {
    padding: 7px 15px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: #fff;
    color: var(--sub);
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }

  .pill:hover,
  .pill.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
    box-shadow: 0 2px 8px rgba(79, 70, 181, .28);
  }

  .stats-row {
    max-width: 1480px;
    margin: 0 auto 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 14px;
  }

  .stat-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow);
    text-align: center;
  }

  .stat-card .num {
    color: var(--primary);
    font-size: 30px;
    font-weight: 780;
  }

  .stat-card .label {
    color: var(--sub);
    font-size: 13px;
    margin-top: 4px;
  }

  .analytics-row {
    max-width: 1480px;
    margin: 0 auto 20px;
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: 16px;
  }

  .chart-card {
    background: #fff;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px;
    min-height: 430px;
  }

  .chart-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 12px;
  }

  .chart-title {
    color: var(--text);
    font-size: 17px;
    font-weight: 760;
  }

  .chart-subtitle {
    color: var(--sub);
    font-size: 12px;
    margin-top: 4px;
  }

  .chart-badge {
    border-radius: 999px;
    background: #f0edff;
    color: var(--primary);
    font-size: 12px;
    font-weight: 680;
    padding: 6px 10px;
    white-space: nowrap;
  }

  .chart-body {
    min-height: 340px;
  }

  .chart-body svg {
    width: 100%;
    height: 340px;
    display: block;
  }

  .matrix-cell {
    fill: #f2f2f2;
    stroke: #e3e9f2;
    stroke-width: 1;
  }

  .matrix-cell.hot { fill: #c6e0b4; }
  .matrix-cell.core { fill: #fff1c6; }
  .matrix-cell.warn { fill: #f2f2f2; }
  .matrix-cell.risk { fill: #f8c7a7; }

  .chart-axis-label {
    fill: #68717d;
    font-size: 12px;
    font-weight: 680;
  }

  .chart-small-label {
    fill: #8a94a3;
    font-size: 10px;
  }

  .person-dot {
    stroke: #fff;
    stroke-width: 2;
  }

  .person-label {
    fill: #263238;
    font-size: 10px;
    font-weight: 680;
  }

  .radar-grid {
    fill: none;
    stroke: #dce3ee;
    stroke-width: 1;
  }

  .radar-axis {
    stroke: #e5ebf3;
    stroke-width: 1;
  }

  .radar-label {
    fill: #68717d;
    font-size: 11px;
    font-weight: 680;
  }

  .radar-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    color: var(--sub);
    font-size: 12px;
    margin-top: 2px;
  }

  .legend-item {
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  .legend-swatch {
    width: 18px;
    height: 8px;
    border-radius: 999px;
    display: inline-block;
  }

  .admin-panel {
    max-width: 1480px;
    margin: 0 auto 20px;
    background: #fff;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px;
    display: none;
  }

  .admin-panel.open { display: block; }

  .admin-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .admin-head h2 {
    font-size: 18px;
    color: var(--text);
  }

  .admin-note {
    color: var(--sub);
    font-size: 12px;
    margin-top: 4px;
  }

  .admin-layout {
    display: grid;
    grid-template-columns: minmax(220px, 300px) 1fr;
    gap: 16px;
  }

  .admin-list {
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .admin-list-item {
    width: 100%;
    border: none;
    border-bottom: 1px solid var(--border);
    background: #fff;
    color: var(--text);
    cursor: pointer;
    display: block;
    padding: 11px 12px;
    text-align: left;
  }

  .admin-list-item:last-child { border-bottom: none; }
  .admin-list-item:hover,
  .admin-list-item.active { background: #f4f2ff; color: var(--primary); }

  .admin-form {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
  }

  .field {
    display: grid;
    gap: 6px;
  }

  .field.wide { grid-column: span 2; }
  .field.full { grid-column: 1 / -1; }

  .field label {
    color: var(--sub);
    font-size: 12px;
    font-weight: 680;
  }

  .field input,
  .field select,
  .field textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font: inherit;
    padding: 9px 10px;
    outline: none;
    background: #fff;
  }

  .field textarea {
    min-height: 76px;
    resize: vertical;
  }

  .checkbox-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    min-height: 40px;
  }

  .checkbox-row label {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text);
    font-weight: 520;
  }

  .score-inputs {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
  }

  .admin-actions {
    grid-column: 1 / -1;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
    padding-top: 4px;
  }

  .search-bar-wrap {
    max-width: 1480px;
    margin: 0 auto 20px;
  }

  .search-bar {
    display: flex;
    gap: 10px;
    align-items: center;
    background: #fff;
    border-radius: var(--radius);
    padding: 10px 18px;
    box-shadow: var(--shadow);
  }

  .search-bar input {
    flex: 1;
    border: none;
    outline: none;
    color: var(--text);
    background: transparent;
    font-size: 15px;
  }

  .search-bar input::placeholder { color: #b6bec9; }

  .cards-grid {
    max-width: 1480px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
    gap: 20px;
  }

  .talent-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: transform .2s, box-shadow .2s;
    animation: fadeUp .4s ease both;
  }

  .talent-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 28px rgba(20, 24, 40, 0.11);
  }

  .talent-card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 5px;
    height: 100%;
    background: linear-gradient(180deg, var(--primary), var(--accent));
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
  }

  .avatar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 20px;
    font-weight: 780;
    flex-shrink: 0;
  }

  .name {
    font-size: 18px;
    font-weight: 760;
  }

  .meta {
    color: var(--sub);
    font-size: 13px;
    margin-top: 3px;
  }

  .badge {
    margin-left: auto;
    border-radius: 999px;
    padding: 5px 11px;
    font-size: 12px;
    font-weight: 680;
    white-space: nowrap;
    background: #eaf8f6;
    color: var(--label);
  }

  .section-label {
    color: #9aa3af;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 680;
    letter-spacing: .8px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .section-label::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .chain {
    display: grid;
    gap: 8px;
    margin-bottom: 14px;
  }

  .chain-row {
    display: grid;
    grid-template-columns: 74px 1fr;
    gap: 10px;
    align-items: center;
    font-size: 13px;
  }

  .chain-key {
    color: var(--muted);
    text-align: right;
  }

  .chain-value {
    color: var(--text);
    font-weight: 640;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }

  .tag {
    border-radius: 14px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 570;
    background: var(--tag-bg);
    color: var(--tag-text);
  }

  .tag.source {
    background: #edf4ff;
    color: var(--source);
  }

  .tag.label {
    background: #eaf8f6;
    color: var(--label);
  }

  .score-bars { margin-bottom: 14px; }

  .score-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 7px;
  }

  .score-name {
    width: 56px;
    color: var(--sub);
    font-size: 12px;
    text-align: right;
    flex-shrink: 0;
  }

  .bar-track {
    flex: 1;
    height: 8px;
    background: #edf0f4;
    border-radius: 4px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width .4s;
  }

  .score-pct {
    width: 34px;
    color: #a3aab5;
    font-size: 11px;
    flex-shrink: 0;
  }

  .profile-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .profile-item {
    background: #fafbfc;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.55;
  }

  .profile-item strong {
    display: block;
    color: var(--sub);
    font-size: 11px;
    letter-spacing: .5px;
    margin-bottom: 3px;
  }

  .personal-analytics {
    display: grid;
    grid-template-columns: 0.86fr 1.14fr;
    gap: 12px;
    margin-bottom: 14px;
  }

  .mini-chart {
    background: #fafbfc;
    border-radius: 10px;
    padding: 10px;
    min-height: 176px;
  }

  .mini-chart-title {
    color: var(--sub);
    font-size: 11px;
    font-weight: 680;
    margin-bottom: 6px;
  }

  .mini-chart svg {
    width: 100%;
    height: 138px;
    display: block;
  }

  .mini-cell {
    fill: #fff;
    stroke: #e3e9f2;
    stroke-width: 1;
  }

  .mini-cell.key { fill: #c6e0b4; }
  .mini-cell.core { fill: #fff1c6; }
  .mini-cell.watch { fill: #f2f2f2; }
  .mini-cell.unfit { fill: #f8c7a7; }

  .mini-cell.active {
    stroke: var(--primary);
    stroke-width: 2;
  }

  .mini-radar-grid {
    fill: none;
    stroke: #dce3ee;
    stroke-width: 1;
  }

  .mini-radar-axis {
    stroke: #e5ebf3;
    stroke-width: 1;
  }

  .mini-radar-label {
    fill: #7b8491;
    font-size: 8px;
    font-weight: 650;
  }

  .empty {
    max-width: 1480px;
    margin: 18px auto;
    padding: 32px;
    color: var(--sub);
    background: #fff;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    text-align: center;
  }

  .footer {
    color: #b7bec9;
    text-align: center;
    margin-top: 36px;
    font-size: 12px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 820px) {
    body { padding: 24px 14px; }
    .quick-filters { grid-template-columns: 1fr; }
    .filter-group { grid-template-columns: 74px 1fr; }
    .admin-layout { grid-template-columns: 1fr; }
    .admin-form { grid-template-columns: 1fr; }
    .field.wide { grid-column: 1; }
    .score-inputs { grid-template-columns: 1fr; }
    .analytics-row { grid-template-columns: 1fr; }
    .cards-grid { grid-template-columns: 1fr; }
    .personal-analytics { grid-template-columns: 1fr; }
    .profile-grid { grid-template-columns: 1fr; }
    h1 { font-size: 24px; }
    .badge { margin-left: 0; }
    .card-header { align-items: flex-start; flex-wrap: wrap; }
  }

  @media print {
    body { background: #fff; padding: 0; }
    .quick-filters, .stats-row, .search-bar-wrap { display: none; }
    .talent-card { break-inside: avoid; box-shadow: none; border: 1px solid #dde2ea; }
  }
</style>
</head>
<body>
  <div class="header">
    <div class="title-row">
      <h1>人才库BI看板</h1>
      <div class="header-actions">
        <button class="action-btn" id="toggleAdminBtn">数据维护</button>
        <button class="action-btn secondary" id="exportBtn">导出JSON</button>
      </div>
    </div>
    <div class="quick-filters" id="filterPills">
      <div class="filter-module">
        <div class="filter-module-title source">
          <span>来源</span>
          <button class="pill active" data-filter="all">全部</button>
        </div>
        <div class="filter-group">
          <span class="filter-label source">来源类型</span>
          <div class="filter-options">
            <button class="pill" data-filter="sourceType-internal">内部</button>
            <button class="pill" data-filter="sourceType-external">外部</button>
          </div>
        </div>
        <div class="filter-group">
          <span class="filter-label source">来源渠道</span>
          <div class="filter-options">
            <button class="pill" data-filter="channel-social">社招</button>
            <button class="pill" data-filter="channel-campus">校招</button>
          </div>
        </div>
        <div class="filter-group">
          <span class="filter-label source">职能岗位</span>
          <div class="filter-options">
            <button class="pill" data-filter="functionRole-marketing">市场</button>
            <button class="pill" data-filter="functionRole-ecommerce">电商</button>
            <button class="pill" data-filter="functionRole-sales">销售</button>
            <button class="pill" data-filter="functionRole-supply">供应链</button>
            <button class="pill" data-filter="functionRole-finance">财务</button>
            <button class="pill" data-filter="functionRole-od">OD</button>
          </div>
        </div>
      </div>
      <div class="filter-module">
        <div class="filter-module-title label">
          <span>标签</span>
        </div>
        <div class="filter-group">
          <span class="filter-label label">人才类别</span>
          <div class="filter-options">
            <button class="pill" data-filter="category-keyTalent">关键人才</button>
            <button class="pill" data-filter="category-highPotential">高潜人才</button>
            <button class="pill" data-filter="category-successor">继任人才</button>
          </div>
        </div>
        <div class="filter-group">
          <span class="filter-label label">人才计划</span>
          <div class="filter-options">
            <button class="pill" data-filter="plan-cp">CP</button>
            <button class="pill" data-filter="plan-fdr">FDR</button>
            <button class="pill" data-filter="plan-mt">MT</button>
            <button class="pill" data-filter="plan-department">部门计划</button>
          </div>
        </div>
        <div class="filter-group">
          <span class="filter-label label">人才表现</span>
          <div class="filter-options">
            <button class="pill" data-filter="performance-highCreativity">高创造力</button>
            <button class="pill" data-filter="performance-lowCreativity">低创造力</button>
            <button class="pill" data-filter="performance-highOkr">高OKR</button>
            <button class="pill" data-filter="performance-lowOkr">低OKR</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="admin-panel" id="adminPanel">
    <div class="admin-head">
      <div>
        <h2>后台数据维护</h2>
        <p class="admin-note">修改会自动保存到当前浏览器；要同步给其他人，请导出 JSON 后统一更新发布数据。</p>
      </div>
      <div class="header-actions">
        <button class="action-btn" id="backToDashboardBtn">返回看板</button>
        <button class="action-btn secondary" id="newTalentBtn">新增人才</button>
        <button class="action-btn secondary" id="importBtn">导入JSON</button>
        <input type="file" id="importFile" accept="application/json,.json" style="display:none;">
        <button class="action-btn danger" id="resetDataBtn">恢复示例数据</button>
      </div>
    </div>
    <div class="admin-layout">
      <div class="admin-list" id="adminList"></div>
      <form class="admin-form" id="adminForm">
        <input type="hidden" id="talentIndex">
        <div class="field">
          <label for="nameInput">姓名</label>
          <input id="nameInput" required>
        </div>
        <div class="field">
          <label for="yearsInput">年限</label>
          <input id="yearsInput" type="number" min="0" max="40" required>
        </div>
        <div class="field wide">
          <label for="roleInput">岗位</label>
          <input id="roleInput" required>
        </div>
        <div class="field">
          <label for="sourceTypeInput">来源类型</label>
          <select id="sourceTypeInput">
            <option value="internal">内部</option>
            <option value="external">外部</option>
          </select>
        </div>
        <div class="field">

let talents = loadTalents();
let activeTalentIndex = 0;

function loadTalents() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) {
      localStorage.setItem(DATA_VERSION_KEY, DEFAULT_DATA_VERSION);
      return cloneTalents(DEFAULT_TALENTS);
    }
    const parsed = JSON.parse(saved);
    return Array.isArray(parsed) ? parsed.map(normalizeTalent) : cloneTalents(DEFAULT_TALENTS);
  } catch (err) {
    return cloneTalents(DEFAULT_TALENTS);
  }
}

function cloneTalents(list) {
  return JSON.parse(JSON.stringify(list)).map(normalizeTalent);
}

function saveTalents() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(talents, null, 2));
  localStorage.setItem(DATA_VERSION_KEY, DEFAULT_DATA_VERSION);
}

function clampScore(value) {
  const num = Number(value);
  if (Number.isNaN(num)) return 0;
  return Math.max(0, Math.min(100, num));
}

function normalizeCategory(value) {
  if (CATEGORY_NAMES[value]) return value;
  if (value === 'potential') return 'highPotential';
  if (value === 'backbone') return 'keyTalent';
  return 'keyTalent';
}

function normalizeTalent(t, index = 0) {
  const sourceType = SOURCE_TYPE_NAMES[t.sourceType] ? t.sourceType : 'external';
  const channel = CHANNEL_NAMES[t.channel] ? t.channel : 'social';
  const functionRole = FUNCTION_NAMES[t.functionRole] ? t.functionRole : 'marketing';
  const category = normalizeCategory(t.category);
  const plan = PLAN_NAMES[t.plan] ? t.plan : 'department';
  const performance = Array.isArray(t.performance)
    ? t.performance.filter(k => PERFORMANCE_NAMES[k])
    : ['highCreativity', 'highOkr'];
  const safePerformance = performance.length ? performance : ['highCreativity', 'highOkr'];

  const talent = {
    name: String(t.name || '未命名人才').trim(),
    years: Number(t.years || 0),
    sourceType,
    channel,
    channelDetail: String(t.channelDetail || '').trim(),
    functionRole,
    role: String(t.role || '').trim(),
    category,
    plan,
    performance: safePerformance,
    scores: {
      creativity: clampScore(t.scores?.creativity),
      okr: clampScore(t.scores?.okr),
      readiness: clampScore(t.scores?.readiness),
      mobility: clampScore(t.scores?.mobility)
    },
    strength: String(t.strength || '').trim(),
    creativityStrength: String(t.creativityStrength || t.strength || defaultCreativityStrength(t)).trim(),
    creativityWeakness: String(t.creativityWeakness || defaultCreativityWeakness(t)).trim(),
    developmentAdvice: String(t.developmentAdvice || defaultDevelopmentAdvice(t)).trim(),
    risk: String(t.risk || '').trim(),
    avatarColor: Number.isInteger(t.avatarColor) ? t.avatarColor : index
  };
  talent.sourceSummary = makeSourceSummary(talent);
  talent.tagSummary = makeTagSummary(talent);
  return talent;
}

function makeSourceSummary(t) {
  return [
    SOURCE_TYPE_NAMES[t.sourceType],
    CHANNEL_NAMES[t.channel],
    t.channelDetail,
    `${FUNCTION_NAMES[t.functionRole]}岗位`
  ].filter(Boolean).join(' × ');
}

function makeTagSummary(t) {
  return [
    CATEGORY_NAMES[t.category],
    PLAN_NAMES[t.plan],
    ...t.performance.map(k => PERFORMANCE_NAMES[k])
  ].filter(Boolean).join(' × ');
}

function defaultCreativityStrength(t) {
  const creativity = clampScore(t.scores?.creativity);
  if (creativity >= 80) return '创造力表现突出，能够主动提出新想法并推动方案成型。';
  if (creativity >= 60) return '具备一定创新意识，能够在既有框架内提出优化建议。';
  return '执行稳定，能够在明确任务和方法支持下完成改善动作。';
}

function defaultCreativityWeakness(t) {
  const creativity = clampScore(t.scores?.creativity);
  const okr = clampScore(t.scores?.okr);
  if (creativity >= 80 && okr < 60) return '创意落地和结果转化不足，需要加强目标拆解与业务闭环。';
  if (creativity < 60 && okr >= 80) return '偏执行和结果导向，原创方案、跨场景迁移和主动破题能力不足。';
  if (creativity < 60) return '创造力基础较弱，对复杂问题的重新定义和方案设计能力需要提升。';
  return '创意稳定性和差异化表达仍有提升空间，需要形成可复用的方法。';
}

function defaultDevelopmentAdvice(t) {
  const creativity = clampScore(t.scores?.creativity);
  const okr = clampScore(t.scores?.okr);
  if (creativity >= 80 && okr >= 80) return '给予更高复杂度的创新项目，沉淀方法论并带教团队复制经验。';
  if (creativity >= 80 && okr < 60) return '配置业务导师，建立创意方案的指标假设、里程碑和复盘机制。';
  if (creativity < 60 && okr >= 80) return '安排跨职能共创和开放式课题训练，提升从执行到方案设计的能力。';
  return '从小型改善项目开始，明确目标、方法和复盘节奏，逐步提升完整闭环能力。';
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[ch]));
}

function matrixOkrValue(t) {
  return 2 + clampScore(t.scores.okr) * 0.03;
}

function matrixCreativityValue(t) {
  return 20 + clampScore(t.scores.creativity) * 0.3;
}

function matrixSegmentByValues(okrValue, creativityValue) {
  if (okrValue >= 3.5 && creativityValue >= 30) return '关键人才';
  if (okrValue >= 3 && okrValue < 3.5 && creativityValue >= 30) return '中坚力量';
  if (okrValue < 3.5 && creativityValue < 30) return '不胜任';
  return '待观察';
}

function averageScore(t) {
  return Math.round((t.scores.creativity + t.scores.okr + t.scores.readiness + t.scores.mobility) / 4);
}

function polarPoint(cx, cy, radius, angle, value) {
  const r = radius * (value / 100);
  return {
    x: cx + Math.cos(angle) * r,
    y: cy + Math.sin(angle) * r
  };
}

function pointsToString(points) {
  return points.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
}

function renderMatrix(list) {
  const host = document.getElementById('matrixChart');

  const width = 640;
  const height = 340;
  const left = 72;
  const top = 32;
  const size = 246;
  const xBounds = [left, left + size / 3, left + size / 2, left + size];
  const y30 = top + size - ((30 - 20) / 30) * size;
  const y40 = top + size - ((40 - 20) / 30) * size;
  const yBounds = [top, y40, y30, top + size];
  const axisY = top + size + 28;
  const axisX = left - 34;
  const cellNames = [
    ['待观察', '中坚力量', '关键人才'],
    ['待观察', '中坚力量', '关键人才'],
    ['不胜任', '待观察', '待观察']
  ];

  const cellSvg = [];
  for (let row = 0; row < 3; row++) {
    for (let col = 0; col < 3; col++) {
      const label = cellNames[row][col];

      const x = xBounds[col];

      const h = yBounds[row + 1] - yBounds[row];
      cellSvg.push(`
        <rect class="matrix-cell ${cls}" x="${x}" y="${y}" width="${w}" height="${h}" rx="8"></rect>

    }
  }

  const grouped = new Map();

    const okr = matrixOkrValue(t);
    const creativity = matrixCreativityValue(t);
    const key = `${Math.floor(okr * 10)}-${Math.floor(creativity)}`;
    const offset = grouped.get(key) || 0;
    grouped.set(key, offset + 1);
    const jitter = ((offset % 5) - 2) * 6;
    const x = left + ((okr - 2) / 3) * size + jitter;
    const y = top + size - ((creativity - 20) / 30) * size + Math.floor(offset / 5) * 6;

      ${cellSvg.join('')}

      <line x1="${left}" y1="${top}" x2="${left}" y2="${top + size}" stroke="#cfd8e6" stroke-width="1.5"></line>
      <text class="chart-axis-label" x="${left + size / 2}" y="${axisY}" text-anchor="middle">OKR达成</text>
      <text class="chart-axis-label" x="${axisX}" y="${top + size / 2}" text-anchor="middle" transform="rotate(-90 ${axisX} ${top + size / 2})">创造力</text>
      <text class="chart-small-label" x="${left}" y="${axisY - 22}" text-anchor="middle">2</text>
      <text class="chart-small-label" x="${left + size / 3}" y="${axisY - 22}" text-anchor="middle">3</text>
      <text class="chart-small-label" x="${left + size * 2 / 3}" y="${axisY - 22}" text-anchor="middle">4</text>
      <text class="chart-small-label" x="${left + size}" y="${axisY - 22}" text-anchor="middle">5</text>
      <text class="chart-small-label" x="${left - 18}" y="${top + size}" text-anchor="middle">20</text>
      <text class="chart-small-label" x="${left - 18}" y="${y30 + 4}" text-anchor="middle">30</text>
      <text class="chart-small-label" x="${left - 18}" y="${y40 + 4}" text-anchor="middle">40</text>

      <text class="chart-small-label" x="${left + 6}" y="${axisY + 20}" text-anchor="middle">低</text>
      <text class="chart-small-label" x="${left + size - 6}" y="${axisY + 20}" text-anchor="middle">高</text>

      <text class="chart-small-label" x="390" y="96">OKR 3.0-3.5 且创造力≥30 为中坚力量</text>
      <text class="chart-small-label" x="390" y="120">OKR&lt;3.5 且创造力&lt;30 为不胜任，其余为待观察</text>
    </svg>
  `;
}

function radarValues(t) {
  return RADAR_AXES.map(axis => axis.get(t));
}

function matrixPositionName(t) {
  return matrixSegmentByValues(matrixOkrValue(t), matrixCreativityValue(t));
}

  const y40 = size - ((40 - 20) / 30) * size;

  const col = okr >= 3.5 ? 2 : okr >= 3 ? 1 : 0;
  const row = creativity >= 40 ? 0 : creativity >= 30 ? 1 : 2;
  const x = ((okr - 2) / 3) * size;
  const y = size - ((creativity - 20) / 30) * size;
  const label = matrixPositionName(t);
  const labelOnLeft = x > 68;

  const cellNames = [
    ['待观察', '中坚力量', '关键人才'],
    ['待观察', '中坚力量', '关键人才'],
    ['不胜任', '待观察', '待观察']
  ];
  const cells = [];
  for (let r = 0; r < 3; r++) {
    for (let c = 0; c < 3; c++) {

      <text class="chart-small-label" x="54" y="126" text-anchor="middle">OKR达成</text>
      <text class="chart-small-label" x="-14" y="58" text-anchor="middle" transform="rotate(-90 -14 58)">创造力</text>
      <text class="chart-small-label" x="0" y="120" text-anchor="middle">2</text>
      <text class="chart-small-label" x="36" y="120" text-anchor="middle">3</text>

function renderMiniRadar(t) {
  const width = 206;
  const height = 138;
  const cx = 103;
  const cy = 68;
  const radius = 44;
  const angleStep = (Math.PI * 2) / RADAR_AXES.length;
  const start = -Math.PI / 2;
  const color = CHART_COLORS[t.avatarColor % CHART_COLORS.length];
  const grid = [33, 66, 100].map(level => {
    const pts = RADAR_AXES.map((_, i) => polarPoint(cx, cy, radius, start + i * angleStep, level));
    return `<polygon class="mini-radar-grid" points="${pointsToString(pts)}"></polygon>`;
  }).join('');
  const axes = RADAR_AXES.map((axis, i) => {
    const angle = start + i * angleStep;
    const end = polarPoint(cx, cy, radius, angle, 100);
    const label = polarPoint(cx, cy, radius + 18, angle, 100);
    return `
      <line class="mini-radar-axis" x1="${cx}" y1="${cy}" x2="${end.x.toFixed(1)}" y2="${end.y.toFixed(1)}"></line>
      <text class="mini-radar-label" x="${label.x.toFixed(1)}" y="${label.y.toFixed(1)}" text-anchor="middle">${axis.name}</text>
    `;
  }).join('');
  const values = radarValues(t);
  const pts = values.map((v, i) => polarPoint(cx, cy, radius, start + i * angleStep, v));
  return `
    <svg viewBox="0 0 ${width} ${height}" aria-label="${escapeHtml(t.name)}个人雷达图">
      ${grid}
      ${axes}
      <polygon points="${pointsToString(pts)}" fill="${color}" fill-opacity="0.18" stroke="${color}" stroke-width="2.5"></polygon>
      ${pts.map(p => `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="2.6" fill="${color}"></circle>`).join('')}
    </svg>
  `;
}

function renderRadar(list) {
  const host = document.getElementById('radarChart');
  const legend = document.getElementById('radarLegend');
  const width = 640;
  const height = 340;
  const cx = 320;
  const cy = 165;
  const radius = 116;
  const angleStep = (Math.PI * 2) / RADAR_AXES.length;
  const start = -Math.PI / 2;

  const grid = [20, 40, 60, 80, 100].map(level => {
    const pts = RADAR_AXES.map((_, i) => polarPoint(cx, cy, radius, start + i * angleStep, level));
    return `<polygon class="radar-grid" points="${pointsToString(pts)}"></polygon>`;
  }).join('');

  const axes = RADAR_AXES.map((axis, i) => {
    const angle = start + i * angleStep;
    const end = polarPoint(cx, cy, radius, angle, 100);
    const label = polarPoint(cx, cy, radius + 32, angle, 100);
    return `
      <line class="radar-axis" x1="${cx}" y1="${cy}" x2="${end.x.toFixed(1)}" y2="${end.y.toFixed(1)}"></line>
      <text class="radar-label" x="${label.x.toFixed(1)}" y="${label.y.toFixed(1)}" text-anchor="middle">${axis.name}</text>
    `;
  }).join('');

  const ordered = [...list].sort((a, b) => averageScore(b) - averageScore(a));
  const selected = ordered.slice(0, 5);
  const averageTalent = list.length ? {
    name: '团队平均',
    scores: {
      creativity: Math.round(list.reduce((s, t) => s + t.scores.creativity, 0) / list.length),
      okr: Math.round(list.reduce((s, t) => s + t.scores.okr, 0) / list.length),
      readiness: Math.round(list.reduce((s, t) => s + t.scores.readiness, 0) / list.length),
      mobility: Math.round(list.reduce((s, t) => s + t.scores.mobility, 0) / list.length)
    }
  } : null;

  const series = averageTalent ? [averageTalent, ...selected] : [];
  const polygons = series.map((t, idx) => {
    const color = idx === 0 ? '#2f6bdc' : CHART_COLORS[(idx + 1) % CHART_COLORS.length];
    const values = radarValues(t);
    const pts = values.map((v, i) => polarPoint(cx, cy, radius, start + i * angleStep, v));
    const fillOpacity = idx === 0 ? 0.14 : 0.06;
    const strokeWidth = idx === 0 ? 3 : 2;
    const markers = pts.map(p => `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="${color}"></circle>`).join('');
    return `
      <g>
        <polygon points="${pointsToString(pts)}" fill="${color}" fill-opacity="${fillOpacity}" stroke="${color}" stroke-width="${strokeWidth}"></polygon>
        ${markers}
      </g>
    `;
  }).join('');

  host.innerHTML = `
    <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="团队能力雷达图">
      ${grid}
      ${axes}
      ${polygons || `<text class="chart-axis-label" x="${cx}" y="${cy}" text-anchor="middle">暂无数据</text>`}
    </svg>
  `;
  legend.innerHTML = series.map((t, idx) => {
    const color = idx === 0 ? '#2f6bdc' : CHART_COLORS[(idx + 1) % CHART_COLORS.length];
    return `<span class="legend-item"><span class="legend-swatch" style="background:${color}"></span>${escapeHtml(t.name)}</span>`;
  }).join('');
}

let activeFilter = 'all';
let searchTerm = '';

function matchFilter(t) {
  if (activeFilter === 'all') return true;

  const [group, value] = activeFilter.split('-');
  if (group === 'sourceType') return t.sourceType === value;
  if (group === 'channel') return t.channel === value;
  if (group === 'functionRole') return t.functionRole === value;
  if (group === 'category') return t.category === value;
  if (group === 'plan') return t.plan === value;
  if (group === 'performance') return t.performance.includes(value);
  return true;
}

function applyFilters() {
  let result = talents.filter(matchFilter);

  if (searchTerm.trim()) {
    const s = searchTerm.trim().toLowerCase();
    result = result.filter(t => {
      const text = [
        t.name, t.role, SOURCE_TYPE_NAMES[t.sourceType], CHANNEL_NAMES[t.channel],
        t.channelDetail, FUNCTION_NAMES[t.functionRole], CATEGORY_NAMES[t.category],
        PLAN_NAMES[t.plan], ...t.performance.map(k => PERFORMANCE_NAMES[k]),
        t.creativityStrength, t.creativityWeakness, t.developmentAdvice, t.risk
      ].join(' ').toLowerCase();
      return text.includes(s);
    });
  }

  renderAll(result);
}

function renderAll(list) {
  const grid = document.getElementById('cardsGrid');
  const empty = document.getElementById('emptyState');
  grid.innerHTML = list.map(renderCard).join('');
  grid.style.display = list.length ? 'grid' : 'none';
  empty.style.display = list.length ? 'none' : 'block';
  document.getElementById('resultHint').textContent =
    list.length === talents.length ? '' : `显示 ${list.length} / ${talents.length} 人`;
  updateStats(list);
  renderMatrix(list);
  renderRadar(list);
}

function updateStats(list) {
  document.getElementById('countTotal').textContent = list.length;
  document.getElementById('countInternal').textContent = list.filter(t => t.sourceType === 'internal').length;
  document.getElementById('countExternal').textContent = list.filter(t => t.sourceType === 'external').length;
  document.getElementById('countKeyTalent').textContent = list.filter(t => t.category === 'keyTalent').length;
  document.getElementById('countHighPotential').textContent = list.filter(t => t.category === 'highPotential').length;
  document.getElementById('countSuccessor').textContent = list.filter(t => t.category === 'successor').length;
}

  `).join('');

  list.querySelectorAll('.admin-list-item').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTalentIndex = Number(btn.dataset.index);
      fillAdminForm(activeTalentIndex);
      renderAdminList();
    });
  });
}

function setValue(id, value) {
  document.getElementById(id).value = value ?? '';
}

function fillAdminForm(index) {
  if (!talents.length) {
    talents.push(blankTalent());
    activeTalentIndex = 0;
  }
  const t = talents[index] || talents[0];
  setValue('talentIndex', index);
  setValue('nameInput', t.name);
  setValue('yearsInput', t.years);
  setValue('roleInput', t.role);
  setValue('sourceTypeInput', t.sourceType);
  setValue('channelInput', t.channel);
  setValue('channelDetailInput', t.channelDetail);
  setValue('functionRoleInput', t.functionRole);
  setValue('categoryInput', t.category);
  setValue('planInput', t.plan);
  setValue('creativityInput', t.scores.creativity);
  setValue('okrInput', t.scores.okr);
  setValue('readinessInput', t.scores.readiness);
  setValue('mobilityInput', t.scores.mobility);
  setValue('creativityStrengthInput', t.creativityStrength);
  setValue('creativityWeaknessInput', t.creativityWeakness);
  setValue('developmentAdviceInput', t.developmentAdvice);
  setValue('riskInput', t.risk);
  document.querySelectorAll('input[name="performanceInput"]').forEach(input => {
    input.checked = t.performance.includes(input.value);
  });
}

function readAdminForm() {
  const performance = [...document.querySelectorAll('input[name="performanceInput"]:checked')]
    .map(input => input.value);
  const index = Number(document.getElementById('talentIndex').value || activeTalentIndex);
  const current = talents[index] || {};
  return normalizeTalent({
    name: document.getElementById('nameInput').value,
    years: document.getElementById('yearsInput').value,
    role: document.getElementById('roleInput').value,
    sourceType: document.getElementById('sourceTypeInput').value,
    channel: document.getElementById('channelInput').value,
    channelDetail: document.getElementById('channelDetailInput').value,
    functionRole: document.getElementById('functionRoleInput').value,
    category: document.getElementById('categoryInput').value,
    plan: document.getElementById('planInput').value,
    performance,
    scores: {
      creativity: document.getElementById('creativityInput').value,
      okr: document.getElementById('okrInput').value,
      readiness: document.getElementById('readinessInput').value,
      mobility: document.getElementById('mobilityInput').value
    },
    strength: document.getElementById('creativityStrengthInput').value,
    creativityStrength: document.getElementById('creativityStrengthInput').value,
    creativityWeakness: document.getElementById('creativityWeaknessInput').value,
    developmentAdvice: document.getElementById('developmentAdviceInput').value,
    risk: document.getElementById('riskInput').value,
    avatarColor: current.avatarColor ?? index
  }, index);
}

function refreshDashboard() {
  saveTalents();
  renderAdminList();
  fillAdminForm(Math.min(activeTalentIndex, talents.length - 1));
  applyFilters();
}

function exportTalents() {
  const data = JSON.stringify(talents, null, 2);
  const blob = new Blob([data], { type: 'application/json;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `talent-pool-${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
}

function importTalents(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      if (!Array.isArray(parsed)) throw new Error('JSON 顶层必须是数组');
      talents = parsed.map(normalizeTalent);
      activeTalentIndex = 0;
      refreshDashboard();
      alert('导入成功');
    } catch (err) {
      alert(`导入失败：${err.message}`);
    }
  };
  reader.readAsText(file, 'utf-8');
}

function initAdmin() {
  renderAdminList();
  fillAdminForm(activeTalentIndex);

  document.getElementById('toggleAdminBtn').addEventListener('click', () => {
    document.getElementById('adminPanel').classList.toggle('open');
  });

  document.getElementById('backToDashboardBtn').addEventListener('click', () => {
    document.getElementById('adminPanel').classList.remove('open');
    document.getElementById('cardsGrid').scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  document.getElementById('exportBtn').addEventListener('click', exportTalents);
  document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
  document.getElementById('importFile').addEventListener('change', e => {
    const file = e.target.files?.[0];
    if (file) importTalents(file);
    e.target.value = '';
  });

  document.getElementById('newTalentBtn').addEventListener('click', () => {
    talents.push(blankTalent());
    activeTalentIndex = talents.length - 1;
    refreshDashboard();
    document.getElementById('adminPanel').classList.add('open');
  });

  document.getElementById('deleteTalentBtn').addEventListener('click', () => {
    if (!talents.length) return;
    const t = talents[activeTalentIndex];
    if (!confirm(`确认删除 ${t.name} 吗？`)) return;
    talents.splice(activeTalentIndex, 1);
    if (!talents.length) talents.push(blankTalent());
    activeTalentIndex = Math.max(0, Math.min(activeTalentIndex, talents.length - 1));
    refreshDashboard();
  });

  document.getElementById('resetDataBtn').addEventListener('click', () => {
    if (!confirm('确认恢复示例数据？当前浏览器里的维护数据会被覆盖。')) return;
    talents = cloneTalents(DEFAULT_TALENTS);
    activeTalentIndex = 0;
    refreshDashboard();
  });

  document.getElementById('adminForm').addEventListener('submit', e => {
    e.preventDefault();
    talents[activeTalentIndex] = readAdminForm();
    refreshDashboard();
  });
}

document.querySelectorAll('#filterPills .pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#filterPills .pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    applyFilters();
  });
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value;
  applyFilters();
});

initAdmin();
renderAll(talents);
</script>
</body>
</html>
